services:

  postgres:
    image: postgres:18.3
    container_name: imagetalk-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - ./data/postgres:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: imagetalk-qdrant
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-0.21.2}
    container_name: imagetalk-ollama
    environment:
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS}
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: q8_0
      OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "${OLLAMA_PORT}:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    image: ghcr.io/freeflyer/imagetalk-backend:${IMAGETALK_VERSION:-latest}
    container_name: imagetalk-backend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_CONTEXT: ${EMBEDDING_CONTEXT}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION}
      DESCRIBE_MODEL: ${DESCRIBE_MODEL}
      DESCRIBE_CONTEXT: ${DESCRIBE_CONTEXT}
      DESCRIBE_TEMPERATURE: ${DESCRIBE_TEMPERATURE}
      DESCRIBE_LANGUAGE: ${DESCRIBE_LANGUAGE}
      TALKING_MODEL: ${TALKING_MODEL}
      TALKING_CONTEXT: ${TALKING_CONTEXT}
      TALKING_TEMPERATURE: ${TALKING_TEMPERATURE}
      SEARCH_LIMIT: ${SEARCH_LIMIT}
      IMAGE_EXTENSIONS: ${IMAGE_EXTENSIONS}
      LOG_LEVEL: ${LOG_LEVEL}
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT}
      IMAGETALK_ROOT: ${IMAGETALK_ROOT}
      IMAGETALK_ROOT_MOUNT: /data/images
    volumes:
      - ${IMAGETALK_ROOT}:/data/images:ro
    ports:
      - "${BACKEND_PORT}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    image: ghcr.io/freeflyer/imagetalk-frontend:${IMAGETALK_VERSION:-latest}
    container_name: imagetalk-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      IMAGETALK_BACKEND_URL: http://localhost:${BACKEND_PORT}
    ports:
      - "${FRONTEND_PORT}:80"
    restart: unless-stopped
